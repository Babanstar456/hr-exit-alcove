<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
       <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #23242a;
        }
        .box {
            position: relative;
            width: 380px;
            height: 420px;
            background-color: #1c1c1c;
            border-radius: 8px;
            overflow: hidden;
        }
        .box::before,
        .box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 380px;
            height: 420px;
            background: linear-gradient(0deg, transparent, #45f3ff, #45f3ff);
            transform-origin: bottom right;
            animation: animate 6s linear infinite;
        }
        .box::after {
            animation-delay: -3s;
        }
        @keyframes animate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .form {
            position: absolute;
            inset: 2px;
            border-radius: 8px;
            background: #28292d;
            z-index: 10;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form img {
            height: 80px;
            margin-bottom: 10px;
        }
        .form h2 {
            color: #45f3ff;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.1em;
        }
        .inputBox {
            position: relative;
            width: 100%;
            margin-top: 12px;
        }
        .inputBox input {
            position: relative;
            width: 100%;
            padding: 20px 10px 10px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1em;
            letter-spacing: 0.05em;
            z-index: 10;
        }
        .inputBox span {
            position: absolute;
            left: 0;
            padding: 20px 0px 10px;
            font-size: 1em;
            color: #8f8f8f;
            pointer-events: none;
            transition: 0.5s;
        }
        .inputBox input:valid ~ span,
        .inputBox input:focus ~ span {
            color: #45f3ff;
            transform: translateY(-34px);
            font-size: 0.75em;
        }
        .inputBox i {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: #45f3ff;
            border-radius: 4px;
            transition: 0.5s;
        }
        .inputBox input:valid ~ i,
        .inputBox input:focus ~ i {
            height: 44px;
        }
        .links {
            display: flex;
            justify-content: space-between;
        }
        .links a {
            margin: 10px 0;
            font-size: 0.75em;
            color: #8f8f8f;
            text-decoration: none;
        }
        .links a:hover {
            color: #45f3ff;
        }
        input[type="submit"] {
            border: none;
            outline: none;
            background: #45f3ff;
            padding: 11px 25px;
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        input[type="submit"]:active {
            opacity: 0.8;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

<!--        /* Make the background image cover the entire page */-->
        .bg-container {
            /*background-image: url("/static/images/Podium_Landscape_1_1_1_1669ff8986.webp"); !* Use your image path *!*/
            background-size: cover;
            background-position: center;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            }
        /* Make the background video cover the entire page */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Transparent login box centered on the page */
        .login-container {
            width: 100%;
            max-width: 2x00px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8); /* White with 80% opacity */
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1;
            position: relative;
        }

        .login-container h2 {
            text-align: center;
        }
        .bg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
    </style>
</head>
<body>
<!-- Background video -->
    <div class="bg-container">
        <video autoplay muted loop class="bg-video">
            <source src="/static/images/home.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    <div class="container">
        <div class="login-container text-center">
            <h2 class="mb-4">Reset Your Password</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for=>Employee Code:</label>
                    <input type="text" class="form-control" name="emp_code" value="{{ emp_code }}" {{ is_logged_in }} required>
                </div>
                <div class="form-group">
                    <label for=>Old Password:</label>
                    <input type="password" class="form-control" name="old_password" required>
                </div>
                <div class="form-group">
                    <label for=>New Password:</label>
                    <input type="password" class="form-control" name="new_password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </form>

            <a href="{{ url_for('login') }}" class="d-block mt-3">Back to Login</a>
        </div>
    </div>
</body>
</html>
